name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "nuitka[onefile]"

      - name: Prepare temp directory
        shell: pwsh
        run: New-Item -ItemType Directory -Path "C:\tmp" -Force | Out-Null

      - name: Run tests
        run: python run_tests.py

      - name: Build executable
        run: >
          python -m nuitka
          --standalone
          --onefile
          --assume-yes-for-downloads
          --windows-console-mode=disable
          --windows-icon-from-ico=icon.ico
          --include-data-files=icon.ico=icon.ico
          --output-filename="R.E.P.O Vault.exe"
          --output-dir=dist
          main.py

      - name: Package portable zip
        shell: pwsh
        run: Compress-Archive -Path "dist\\R.E.P.O Vault.exe" -DestinationPath "dist\\R.E.P.O-Vault-windows.zip" -Force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/R.E.P.O Vault.exe
            dist/R.E.P.O-Vault-windows.zip
          generate_release_notes: true
          body: |
            > ⚠️ **Windows may flag this file — it is a false positive**
            >
            > R.E.P.O Vault uses cryptographic libraries to read and write `.es3` save files. This triggers antivirus heuristics even though the app is completely safe. The full source code is available in this repository for review.
            >
            > **SmartScreen blocks the app on launch:**
            > Click **"More info"** → **"Run anyway"**
            >
            > **Windows Defender flags the download:**
            > In the browser download bar click **"Keep"** → **"Keep anyway"**.
            > Or open **Windows Security → Virus & threat protection → Protection history**, find the entry, and click **Allow**.
            >
            > This file has been submitted to Microsoft for false positive review.
